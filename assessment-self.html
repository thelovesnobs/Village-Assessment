  {id:"empathy",l:"Empathy",d:"You listen to understand, not just to respond.",cl:"Presence"},

  {id:"purposeful",l:"Purposeful",d:"You move with intention. Your relationships are guided by a clear why.",cl:"Drive"},
  {id:"confidence",l:"Confidence",d:"You know who you are and show up as that person consistently.",cl:"Drive"},
  {id:"determined",l:"Determined",d:"You do not quit on the people or the standards you have committed to.",cl:"Drive"},

const RQ=[
  {id:"rq1",t:"When someone I care about is being treated unfairly, I step in &mdash; even when it costs me.",r:"Protector"},
  {id:"rq2",t:"I naturally take charge of organizing and making sure things move forward with structure.",r:"Manager"},
  {id:"rq3",t:"People come to me when they need to feel heard. I make space for that without being asked.",r:"Nurturer"},
  {id:"rq4",t:"I set the standard and hold it &mdash; even when others want to lower it.",r:"Leader"},

const SIT=[
  {id:"s1",q:"The village is in disagreement and tension is rising. My first response is to:",opts:[
    {id:"a",t:"Step in &mdash; make sure no one gets steamrolled.",sig:{Protector:2}},
    {id:"b",t:"Organize the conversation &mdash; who speaks, what gets decided.",sig:{Manager:2}},

  {id:"s2",q:"Someone needs individual support. I am in the middle of something important for the group:",opts:[

    {id:"b",t:"I figure out who in the village can hold them right now.",sig:{Manager:2,Leader:1}},
    {id:"c",t:"I stop everything &mdash; this person needs me, the group can wait.",sig:{Nurturer:2}},

const RI={
  Protector:{desc:"Creates safety &mdash; physical, emotional, and relational. Shows up when the village is threatened.",str:"Your village trusts you with their most vulnerable moments. You are the reason people feel safe enough to be honest.",bd:"Your shadow is by design. The gaps in your role &mdash; the individual warmth, the long-term structure, the group vision &mdash; give the other roles a place. You do not need to have it all. The village has the rest.",sh:"Your intensity is the depth of your love. When you react strongly, it is because you care deeply. Know when that heat is yours to manage before it lands on others.",bk:"You can step into the Nurturer role &mdash; and sometimes beautifully. But when the true Nurturer shows up, take the back seat. Hold the space so they can work. That is not lesser. That is the village functioning.",alt:"Your protection is real. Honor it by knowing when to guard and when to hold still &mdash; because sometimes the most protective thing you can do is let someone else lead.",vl:["Safety and security for the whole","Stepping in when the village is threatened","Holding the perimeter so others can work"],vf:["Long-term structure &mdash; trust the Manager","Individual emotional warmth &mdash; trust the Nurturer","Group vision &mdash; trust the Leader"],vg:"Safety. The village opens up because of you.",vn:"Space and honesty. Let the village hold you sometimes.",hr:{h:"You are honoring your role. The village needs exactly this &mdash; not more, not differently.",l:"You are carrying more than your role requires. That overreach costs you and the roles being covered."},tr:{h:"You trust the other roles. That trust is what makes the village function.",l:"You find it hard to release what is not yours. The village cannot grow until each role trusts the others."},cf:{fluid:"Steps into other roles and releases cleanly. Village-fluent.",aware:"Steps in and back &mdash; but the transition costs something. Awareness is the first step.",holds:" function hsc(){let t=0,c=0;RH.forEach(q=>{const v=S.ha[q.id];if(v){t+=q.rev?(6-v):v;c++;}});return c?Math.round(t/c):0;}

function elv(){const h=hsc(),t=tsc();if(h>=4&&t>=4)return"e";if(h>=3&&t>=3)return"s";return"b";}
